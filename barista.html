<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barista Dashboard - CVC Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #1e272e; color: #fff; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #485460; }
        .header h1 { margin: 0; font-size: 24px; color: #0be881; }
        
        /* Grid สำหรับจัดเรียงการ์ดออเดอร์ */
        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        
        .order-card { background: #2d3436; border-radius: 12px; padding: 15px; border-top: 5px solid #0984e3; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .order-card.doing { border-top-color: #f39c12; }
        
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #636e72; padding-bottom: 5px;}
        .queue-num { font-size: 20px; font-weight: bold; color: #0984e3; }
        .order-card.doing .queue-num { color: #f39c12; }
        
        .customer-name { font-size: 18px; font-weight: 500; }
        .order-details { white-space: pre-line; font-size: 16px; margin: 15px 0; color: #dfe6e9; line-height: 1.5; }
        .payment-status { font-size: 13px; color: #b2bec3; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-family: 'Kanit'; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        
        .btn-doing { background-color: #f39c12; color: #fff; }
        .btn-done { background-color: #0be881; color: #1e272e; }
        
        #loading { text-align: center; color: #b2bec3; margin-top: 50px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>☕ จอบาริสต้า (Barista Station)</h1>
        <div>
            <span id="last-update" style="font-size: 14px; color: #b2bec3; margin-right: 15px;">อัปเดตล่าสุด: กำลังโหลด...</span>
            <button onclick="fetchOrders()" style="flex:none; padding: 8px 15px; background: #485460; color: white;">🔄 รีเฟรชคิว</button>
        </div>
    </div>

    <div id="loading">กำลังดึงข้อมูลคิว...</div>
    <div class="order-grid" id="order-container"></div>

    <script>
        // 🔴🔴🔴 วางลิงก์ URL ที่ได้จาก Apps Script ของคุณที่นี่ (ลิงก์เดียวกับหน้าลูกค้าเลยครับ) 🔴🔴🔴
        const API_URL = "https://script.google.com/macros/s/AKfycbyxSGf5JObtabaAtmhK94SXoqJIW0FoDQ5K_SNkRUqPbO3pJqNNKrM5NRBZ62z6vp_T/exec"; 

        function fetchOrders() {
            document.getElementById('last-update').innerText = "อัปเดตล่าสุด: กำลังรีเฟรช...";
            
            // ดึงข้อมูลโดยส่ง parameter action=getOrders ไปด้วย
            fetch(API_URL + "?action=getOrders")
                .then(res => res.json())
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    renderOrders(data);
                    
                    const now = new Date();
                    document.getElementById('last-update').innerText = `อัปเดตล่าสุด: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} น.`;
                })
                .catch(err => {
                    document.getElementById('last-update').innerText = "❌ อัปเดตล้มเหลว ลองรีเฟรชใหม่";
                    console.error(err);
                });
        }

        function renderOrders(orders) {
            const container = document.getElementById('order-container');
            if (orders.length === 0) {
                container.innerHTML = "<div style='grid-column: 1/-1; text-align: center; color: #b2bec3; font-size: 20px; padding: 50px;'>🎉 ว่างแล้ว! ยังไม่มีออเดอร์ใหม่เข้ามาครับ</div>";
                return;
            }

            let html = "";
            orders.forEach(order => {
                const isDoing = order.orderStatus.includes("Doing");
                const cardClass = isDoing ? "order-card doing" : "order-card";
                
                html += `
                <div class="${cardClass}">
                    <div class="order-header">
                        <span class="queue-num">${order.orderId}</span>
                        <span style="color:#b2bec3; font-size:14px;">เวลา: ${order.time}</span>
                    </div>
                    <div class="customer-name">👤 ${order.customerName}</div>
                    
                    <div class="order-details">${order.orderDetails}</div>
                    
                    <div class="payment-status">💸 ${order.paymentMethod}</div>
                    
                    <div class="btn-group">
                        ${!isDoing ? `<button class="btn-doing" onclick="updateStatus(${order.rowNumber}, 'Doing (กำลังทำ)')">กำลังทำ ⏳</button>` : ''}
                        <button class="btn-done" onclick="updateStatus(${order.rowNumber}, 'Done (เสร็จแล้ว)')">เสร็จแล้ว ✅</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function updateStatus(rowNumber, newStatus) {
            const payload = {
                action: "updateStatus",
                rowNumber: rowNumber,
                newStatus: newStatus
            };

            // เปลี่ยนปุ่มเป็นสถานะโหลด
            event.target.innerText = "กำลังอัปเดต...";
            event.target.disabled = true;

            fetch(API_URL, {
                method: 'POST',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(result => {
                if(result.status === "success") {
                    fetchOrders(); // ดึงข้อมูลใหม่เพื่อรีเฟรชหน้าจอ
                } else {
                    alert("เกิดข้อผิดพลาด: " + result.message);
                }
            })
            .catch(err => alert("ขัดข้อง กรุณาลองใหม่"));
        }

        // โหลดข้อมูลครั้งแรกเมื่อเปิดหน้าเว็บ
        fetchOrders();

        // 🌟 ตั้งเวลาให้รีเฟรชคิวอัตโนมัติ ทุกๆ 15 วินาที
        setInterval(fetchOrders, 15000);
    </script>
</body>
</html>
