<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Display - CVC Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #1e293b; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10; }
        .header h1 { font-size: 32px; color: #10b981; margin: 0; }
        .time-display { font-size: 24px; color: #94a3b8; font-weight: 300; }
        .board-container { display: flex; flex: 1; padding: 20px; gap: 20px; }
        .column { flex: 1; background: #1e293b; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .col-header { padding: 20px; text-align: center; font-size: 32px; font-weight: 700; text-transform: uppercase; }
        
        .waiting-header { background: #334155; color: #cbd5e1; border-bottom: 4px solid #64748b; }
        .ready-header { background: #10b981; color: #fff; border-bottom: 4px solid #047857; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { background: #10b981; } 50% { background: #059669; } 100% { background: #10b981; } }

        .queue-list { padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; flex: 1; }
        .q-card { background: #0f172a; border-radius: 12px; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid; animation: fadeIn 0.5s ease-out; transition: all 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .q-preparing { border-left-color: #f59e0b; }
        .q-ready { border-left-color: #10b981; background: #064e3b; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        .q-number { font-size: 45px; font-weight: 700; color: #f8fafc; }
        .q-ready .q-number { color: #34d399; }
        .q-name { font-size: 26px; color: #cbd5e1; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .empty-state { text-align: center; color: #475569; font-size: 24px; margin-top: 50px; font-weight: 300; }
        
        /* มือถือแนวตั้ง */
        @media (max-width: 768px) {
            .board-container { flex-direction: column; padding: 10px; }
            .header { padding: 15px 20px; } .header h1 { font-size: 22px; } .time-display { font-size: 18px; }
            .column { min-height: 300px; } .col-header { font-size: 24px; padding: 15px; }
            .q-number { font-size: 35px; } .q-name { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>☕ CVC Cafe | สถานะคิว</h1>
        <div class="time-display" id="clock">--:--</div>
    </div>
    <div class="board-container">
        <div class="column">
            <div class="col-header waiting-header">⏳ กำลังเตรียม (Preparing)</div>
            <div class="queue-list" id="preparing-list"></div>
        </div>
        <div class="column">
            <div class="col-header ready-header">🔔 เชิญรับเครื่องดื่ม (Ready)</div>
            <div class="queue-list" id="ready-list"></div>
        </div>
    </div>

    <script>
        // 🔴 API ของคุณ (ใส่ให้แล้ว)
        const API_URL = "https://script.google.com/macros/s/AKfycbx2Tb2F9ePdssiRPvCaWprnsr0kSMIfuoGKSrtjjq61m2hh7RlQ_aXgqImAzG0ScDxN/exec"; 

        // 🌟 ตัวแปรเก็บเวลาของคิวที่เสร็จแล้ว (เพื่อเอาไว้จับเวลา 1 นาที)
        let readyTimestamps = {};
        const AUTO_HIDE_MS = 60000; // 60,000 มิลลิวินาที = 1 นาที

        function fetchQueue() {
            fetch(API_URL + "?action=getOrders")
                .then(res => res.json())
                .then(orders => renderQueue(orders))
                .catch(err => console.error("Error fetching queue:", err));
        }

        function renderQueue(orders) {
            const preparingList = document.getElementById('preparing-list');
            const readyList = document.getElementById('ready-list');
            let prepHtml = "";
            let readyHtml = "";

            let currentOrderIds = [];

            orders.forEach(order => {
                currentOrderIds.push(order.orderId);
                const status = order.orderStatus || "";
                
                // ถ้าระบุว่าเสร็จแล้ว หรือ พร้อมเสิร์ฟ
                if (status.includes("Ready") || status.includes("เสร็จ") || status.includes("พร้อม")) {
                    
                    // ถ้ารหัสคิวนี้เพิ่งเคยเข้ามาฝั่งขวาครั้งแรก ให้จดเวลาปัจจุบันไว้
                    if (!readyTimestamps[order.orderId]) {
                        readyTimestamps[order.orderId] = Date.now();
                    }

                    // คำนวณเวลาที่ผ่านไปว่าเกิน 1 นาทีหรือยัง
                    const timePassed = Date.now() - readyTimestamps[order.orderId];
                    
                    // 🌟 ถ้าเวลายังไม่เกิน 1 นาที ถึงจะโชว์บนหน้าจอทีวี
                    if (timePassed <= AUTO_HIDE_MS) {
                        readyHtml += `<div class="q-card q-ready"><div class="q-number">${order.orderId}</div><div class="q-name">คุณ ${order.customerName}</div></div>`;
                    }

                } 
                // ถ้ายังทำไม่เสร็จ (กำลังทำ หรือ รอคิว)
                else if (!status.includes("Collected") && !status.includes("รับแล้ว")) {
                    prepHtml += `<div class="q-card q-preparing"><div class="q-number">${order.orderId}</div><div class="q-name">คุณ ${order.customerName}</div></div>`;
                }
            });

            // ล้างความจำคิวเก่าๆ ที่หายไปจากระบบแล้ว
            Object.keys(readyTimestamps).forEach(id => {
                if (!currentOrderIds.includes(id)) delete readyTimestamps[id];
            });

            preparingList.innerHTML = prepHtml || `<div class="empty-state">ยังไม่มีคิวที่กำลังชงครับ</div>`;
            readyList.innerHTML = readyHtml || `<div class="empty-state">กรุณารอสักครู่นะครับ ☺️</div>`;
        }

        function updateClock() {
            const now = new Date(); 
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + " น.";
        }
        
        // รันครั้งแรก และตั้งเวลาให้ดึงข้อมูลใหม่ทุกๆ 5 วินาที
        fetchQueue(); 
        updateClock(); 
        setInterval(fetchQueue, 5000); 
        setInterval(updateClock, 60000);
    </script>
</body>
</html>
