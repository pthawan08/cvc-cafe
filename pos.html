<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - CVC Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { background: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        .header h1 { font-size: 20px; margin: 0; }
        
        /* Main Layout แบ่ง 2 ฝั่ง */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* ฝั่งซ้าย: เมนู (70%) */
        .menu-section { flex: 7; padding: 20px; overflow-y: auto; background: #f0f2f5; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        
        .menu-card { background: white; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.1s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid transparent; }
        .menu-card:active { transform: scale(0.95); border-color: #00B900; }
        .menu-name { font-size: 16px; font-weight: 600; margin-bottom: 5px; color: #2c3e50; }
        .menu-cat { font-size: 12px; color: #7f8c8d; background: #ecf0f1; padding: 2px 8px; border-radius: 10px; display: inline-block; }

        /* ฝั่งขวา: ตะกร้าและคิดเงิน (30%) */
        .cart-section { flex: 3; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.05); z-index: 5; }
        .cart-header { padding: 15px; background: #ecf0f1; font-weight: 600; font-size: 18px; text-align: center; border-bottom: 1px solid #ddd; }
        
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee; font-size: 14px; }
        .del-btn { color: #e74c3c; background: none; border: none; font-size: 18px; cursor: pointer; margin-left: 10px; }

        .checkout-box { padding: 20px; background: #fafafa; border-top: 1px solid #ddd; }
        .total-row { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; color: #e74c3c; margin-bottom: 15px; }
        
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Kanit'; font-size: 15px; margin-bottom: 10px; outline: none; }
        
        .btn-submit { width: 100%; background: #00B900; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; font-family: 'Kanit'; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,185,0,0.3); }
        .btn-submit:disabled { background: #95a5a6; cursor: not-allowed; box-shadow: none; }

        /* Modal เลือกร้อนเย็น/ความหวาน (ทำงานไวขึ้น) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 400px; max-width: 90%; }
        .modal-title { font-size: 20px; margin-bottom: 15px; color: #2c3e50; border-bottom: 2px solid #00B900; padding-bottom: 5px; display: inline-block; }
        .option-group { margin-bottom: 15px; }
        .radio-btn { display: inline-block; margin: 0 5px 10px 0; }
        .radio-btn input[type="radio"] { display: none; }
        .radio-btn label { display: inline-block; padding: 8px 15px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .radio-btn input[type="radio"]:checked + label { background: #00B900; color: white; border-color: #00B900; font-weight: bold; }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #ecf0f1; font-family: 'Kanit'; font-size: 16px; cursor: pointer; }
        .btn-add { flex: 2; padding: 10px; border: none; border-radius: 8px; background: #00B900; color: white; font-family: 'Kanit'; font-size: 16px; font-weight: bold; cursor: pointer; }

    </style>
</head>
<body>

    <div class="header">
        <h1>🖥️ CVC Cafe - ระบบรับออเดอร์หน้าเคาน์เตอร์ (POS)</h1>
        <div style="font-size: 14px;">พนักงานหน้าบาร์</div>
    </div>

    <div class="main-container">
        <div class="menu-section">
            <div id="loading" style="text-align: center; margin-top: 50px; color: #7f8c8d;">กำลังโหลดข้อมูลเมนู...</div>
            <div class="menu-grid" id="menu-container"></div>
        </div>

        <div class="cart-section">
            <div class="cart-header">🛒 รายการออเดอร์</div>
            <div class="cart-items" id="cart-items-container">
                <div style="text-align: center; color: #aaa; margin-top: 50px;">ยังไม่มีรายการสั่งซื้อ</div>
            </div>
            
            <div class="checkout-box">
                <div class="total-row">
                    <span>ยอดรวม:</span>
                    <span id="cart-total">0 ฿</span>
                </div>
                
                <input type="text" id="customer-name" placeholder="ชื่อลูกค้า (หรือชื่อเล่น)..." required>
                
                <select id="payment-method">
                    <option value="เงินสด (รับเงินแล้ว)">💵 เงินสด (รับเงินแล้ว)</option>
                    <option value="โอนเงิน (ตรวจสอบสลิปแล้ว)">📱 โอนเงิน (ตรวจสอบสลิปแล้ว)</option>
                </select>
                
                <button class="btn-submit" id="btn-submit" onclick="submitOrder()">ส่งออเดอร์เข้าครัว</button>
            </div>
        </div>
    </div>

    <div id="optionsModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modal-menu-name">ชื่อเมนู</h3>
            
            <div class="option-group" id="type-options">
                </div>

            <div class="option-group">
                <div style="margin-bottom: 8px; font-weight: 600;">ความหวาน:</div>
                <div class="radio-btn"><input type="radio" name="sweetness" id="sw100" value="หวานปกติ (100%)" checked><label for="sw100">ปกติ (100%)</label></div>
                <div class="radio-btn"><input type="radio" name="sweetness" id="sw50" value="หวานน้อย (50%)"><label for="sw50">หวานน้อย (50%)</label></div>
                <div class="radio-btn"><input type="radio" name="sweetness" id="sw25" value="หวานน้อยมาก (25%)"><label for="sw25">หวานน้อยมาก (25%)</label></div>
                <div class="radio-btn"><input type="radio" name="sweetness" id="sw0" value="ไม่หวานเลย (0%)"><label for="sw0">ไม่หวาน (0%)</label></div>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
                <button class="btn-add" onclick="addToCart()">เพิ่มลงบิล</button>
            </div>
        </div>
    </div>

    <script>
        // 🔴🔴🔴 วางลิงก์ URL ของ Apps Script ตรงนี้ 🔴🔴🔴
        const API_URL = "https://script.google.com/macros/s/AKfycbw9038zk-erMHJxthm0PLiSao90n_34ByHNzPBmiP9rmSWotjdaLlrIPDzu1Su0aH-i/exec"; 

        let menuData = []; 
        let currentItem = null; 
        let cart = []; 

        // 1. โหลดเมนู
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                menuData = data;
                renderMenu();
            })
            .catch(err => alert("โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรช"));

        function renderMenu() {
            let html = "";
            menuData.forEach(item => {
                html += `
                <div class="menu-card" onclick="openModal('${item.id}')">
                    <div class="menu-cat">${item.category}</div>
                    <div class="menu-name">${item.name}</div>
                    <div style="font-size: 13px; color: #e74c3c;">เริ่มต้น ${item.priceHot || item.priceIce || item.priceFrappe}฿</div>
                </div>`;
            });
            document.getElementById('menu-container').innerHTML = html;
        }

        // 2. จัดการ Modal เลือกออเดอร์
        function openModal(id) {
            currentItem = menuData.find(m => m.id === id);
            document.getElementById('modal-menu-name').innerText = currentItem.name;
            
            let typeHtml = "<div style='margin-bottom: 8px; font-weight: 600;'>ประเภท:</div>";
            if(currentItem.priceHot) typeHtml += `<div class="radio-btn"><input type="radio" name="drinkType" id="typeHot" value="ร้อน" data-price="${currentItem.priceHot}" checked><label for="typeHot">ร้อน (${currentItem.priceHot}฿)</label></div>`;
            if(currentItem.priceIce) typeHtml += `<div class="radio-btn"><input type="radio" name="drinkType" id="typeIce" value="เย็น" data-price="${currentItem.priceIce}" ${!currentItem.priceHot ? 'checked' : ''}><label for="typeIce">เย็น (${currentItem.priceIce}฿)</label></div>`;
            if(currentItem.priceFrappe) typeHtml += `<div class="radio-btn"><input type="radio" name="drinkType" id="typeFrappe" value="ปั่น" data-price="${currentItem.priceFrappe}"><label for="typeFrappe">ปั่น (${currentItem.priceFrappe}฿)</label></div>`;
            
            document.getElementById('type-options').innerHTML = typeHtml;
            
            // รีเซ็ตความหวานกลับไปที่ปกติทุกครั้งที่เปิด
            document.getElementById('sw100').checked = true;
            
            document.getElementById('optionsModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('optionsModal').style.display = 'none'; }

        // 3. จัดการตะกร้า
        function addToCart() {
            const selectedType = document.querySelector('input[name="drinkType"]:checked');
            const selectedSweetness = document.querySelector('input[name="sweetness"]:checked').value;
            
            cart.push({
                name: currentItem.name,
                type: selectedType.value,
                sweetness: selectedSweetness,
                price: parseInt(selectedType.getAttribute('data-price'))
            });

            closeModal();
            renderCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            if (cart.length === 0) {
                container.innerHTML = "<div style='text-align: center; color: #aaa; margin-top: 50px;'>ยังไม่มีรายการสั่งซื้อ</div>";
                document.getElementById('cart-total').innerText = "0 ฿";
                return;
            }

            let html = "";
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                html += `
                <div class="cart-item">
                    <div style="flex:1;">
                        <strong>${item.name}</strong> (${item.type})<br>
                        <small style="color:#7f8c8d;">${item.sweetness}</small>
                    </div>
                    <div style="font-weight:bold; margin-right:10px;">${item.price} ฿</div>
                    <button class="del-btn" onclick="removeFromCart(${index})">❌</button>
                </div>`;
            });

            container.innerHTML = html;
            document.getElementById('cart-total').innerText = total + " ฿";
        }

        // 4. ส่งออเดอร์
        function submitOrder() {
            if (cart.length === 0) { alert("ยังไม่ได้เลือกเมนูครับ"); return; }
            
            const customerName = document.getElementById('customer-name').value;
            if (!customerName) { alert("กรุณาใส่ชื่อลูกค้าครับ"); return; }

            const paymentMethod = document.getElementById('payment-method').value;
            const btn = document.getElementById('btn-submit');
            btn.innerText = "กำลังส่งออเดอร์...";
            btn.disabled = true;

            const payload = {
                customerName: customerName,
                cart: cart,
                totalAmount: cart.reduce((sum, item) => sum + item.price, 0),
                paymentMethod: paymentMethod
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(result => {
                if(result.status === "success") {
                    alert(`✅ ส่งออเดอร์สำเร็จ!\nคิว: ${result.orderId}`);
                    
                    // สเตปต่อไป: โค้ดสำหรับเครื่องปริ้นท์ใบเสร็จจะถูกนำมาใส่ตรงนี้!
                    
                    // เคลียร์บิล
                    cart = [];
                    renderCart();
                    document.getElementById('customer-name').value = "";
                } else {
                    alert("เกิดข้อผิดพลาด: " + result.message);
                }
            })
            .catch(err => {
                alert("เชื่อมต่อล้มเหลว กรุณาลองใหม่");
                console.error(err);
            })
            .finally(() => {
                btn.innerText = "ส่งออเดอร์เข้าครัว";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
